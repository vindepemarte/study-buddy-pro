# SearXNG settings for Thuki local search sandbox.
# Tuned for maximum result quality with no rate limiting since this runs locally.
use_default_settings: true

server:
  secret_key: "thuki-searxng-local-dev-secret-key-change-if-exposed"
  limiter: false
  public_instance: false
  image_proxy: true
  method: "GET"

ui:
  static_use_hash: false
  default_locale: "en"
  query_in_title: true
  infinite_scroll: false
  default_theme: simple
  center_alignment: true
  results_on_new_tab: false
  search_on_category_select: true
  hotkeys: default

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  ban_time_on_fail: 0
  max_ban_time_on_fail: 0
  formats:
    - html
    - json
  suspended_times:
    SearxEngineAccessDenied: 0
    SearxEngineCaptcha: 0
    SearxEngineTooManyRequests: 0
    cf_SearxEngineCaptcha: 0
    cf_SearxEngineAccessDenied: 0
    recaptcha_SearxEngineCaptcha: 0

outgoing:
  request_timeout: 15.0
  max_request_timeout: 30.0
  pool_connections: 100
  pool_maxsize: 30
  enable_http2: true
  retries: 2
  max_redirects: 30

engines:
  # General web: enable high-quality engines, boost weights for best sources
  - name: google
    engine: google
    disabled: false
    weight: 3

  - name: bing
    engine: bing
    disabled: false
    weight: 2

  - name: duckduckgo
    engine: duckduckgo
    disabled: false
    weight: 2

  - name: brave
